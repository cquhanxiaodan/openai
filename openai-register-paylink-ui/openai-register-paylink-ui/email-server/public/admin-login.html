<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>管理员登录</title>
<style>
  :root { color-scheme: dark; --line: rgba(148,163,184,.22); --text: #eef5ff; --muted: #92a5bd; --blue: #57c7ff; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 18px; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: radial-gradient(circle at 18% 0%, rgba(87,199,255,.28), transparent 28rem), linear-gradient(135deg, #08111f, #100f20); }
  .card { width: min(460px, 100%); border: 1px solid var(--line); border-radius: 24px; padding: 24px; background: rgba(13,23,40,.92); box-shadow: 0 30px 110px rgba(0,0,0,.5); }
  h1 { margin: 0 0 8px; font-size: 26px; }
  p { margin: 0 0 18px; color: var(--muted); line-height: 1.6; font-size: 14px; }
  label { display: block; margin-bottom: 8px; color: #cbd8e8; font-weight: 800; font-size: 13px; }
  input { width: 100%; height: 44px; border: 1px solid var(--line); border-radius: 14px; padding: 0 12px; color: var(--text); background: rgba(3,10,20,.72); outline: none; }
  input:focus { border-color: rgba(87,199,255,.72); box-shadow: 0 0 0 4px rgba(87,199,255,.1); }
  .row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  button, a { min-height: 42px; display: inline-flex; align-items: center; justify-content: center; padding: 10px 15px; border-radius: 13px; border: 0; font: inherit; font-weight: 900; text-decoration: none; cursor: pointer; }
  button { color: #03101d; background: linear-gradient(135deg, var(--blue), #2097ff); }
  a { color: var(--text); border: 1px solid var(--line); background: rgba(148,163,184,.14); }
  .error { min-height: 20px; margin-top: 10px; color: #ff9aad; font-size: 13px; }
</style>
</head>
<body>
<main class="card">
  <h1>管理员登录</h1>
  <p>管理员账号库不会在未验证时返回到浏览器。请输入服务端配置的 `ADMIN_KEY`。</p>
  <label for="adminKey">管理员密钥</label>
  <input id="adminKey" type="password" autocomplete="current-password" autofocus />
  <div class="row">
    <button id="btnLogin">进入账号库</button>
    <a href="/">返回用户端</a>
  </div>
  <div class="error" id="error"></div>
</main>
<script>
async function login() {
  const error = document.getElementById('error');
  error.textContent = '';
  const adminKey = document.getElementById('adminKey').value.trim();
  try {
    const response = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminKey }),
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || data.ok === false) throw new Error(data.error || `HTTP ${response.status}`);
    location.href = '/admin.html';
  } catch (err) {
    error.textContent = err.message;
  }
}
document.getElementById('btnLogin').addEventListener('click', login);
document.getElementById('adminKey').addEventListener('keydown', event => { if (event.key === 'Enter') login(); });
</script>
</body>
</html>
